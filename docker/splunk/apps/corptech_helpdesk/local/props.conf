# ── Nginx access log parsing ─────────────────────────────────
[nginx_access]
SHOULD_LINEMERGE = false
LINE_BREAKER     = ([\r\n]+)
TIME_PREFIX      = \[
TIME_FORMAT      = %d/%b/%Y:%H:%M:%S %z
MAX_TIMESTAMP_LOOKAHEAD = 40

# Extract fields from combined log format
EXTRACT-nginx = ^(?P<client_ip>\S+)\s+\S+\s+(?P<user>\S+)\s+\[(?P<timestamp>[^\]]+)\]\s+"(?P<method>\w+)\s+(?P<uri>\S+)\s+\S+"\s+(?P<status>\d+)\s+(?P<bytes>\d+|-)\s+"(?P<referrer>[^"]*)"\s+"(?P<user_agent>[^"]*)"

EVAL-status_class = case(status>=500,"5xx - Server Error",status>=400,"4xx - Client Error",status>=300,"3xx - Redirect",status>=200,"2xx - Success",true(),"Other")
