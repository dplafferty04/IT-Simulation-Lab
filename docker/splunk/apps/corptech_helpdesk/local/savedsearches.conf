##############################################################
# savedsearches.conf ‚Äî CorpTech Helpdesk Operations Alerts
#
# INSTALLATION:
#   Place this file at:
#   $SPLUNK_HOME/etc/apps/corptech_helpdesk/local/savedsearches.conf
#   then restart Splunk or reload the app.
#
#   Or import via UI:
#   Settings > Searches, Reports, and Alerts > New Alert
#   (paste each search individually)
#
# ADJUST:
#   - action.email.to = your real alert email
#   - index = your actual Windows Event Log index name
##############################################################

# ‚îÄ‚îÄ Alert 1: Account Lockout ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
[ALERT - Account Lockout Detected]
search = index=wineventlog sourcetype="WinEventLog:Security" EventCode=4740 \
| eval locked_account=mvindex(Account_Name,0) \
| eval source_workstation=mvindex(Caller_Computer_Name,0) \
| table _time, locked_account, source_workstation, host
description = Fires immediately when any domain account is locked out (Event 4740). \
Triggered by 5+ failed logon attempts within the observation window.
disabled = 0
cron_schedule = */5 * * * *
dispatch.earliest_time = -6m
dispatch.latest_time = now
enableSched = 1
counttype = number of events
relation = greater than
quantity = 0
alert.severity = 3
alert.suppress = 1
alert.suppress.period = 5m
alert.suppress.fields = locked_account
alert_type = number of events
alert.track = 1

# Email action ‚Äî enable and configure with your SMTP settings
action.email = 1
action.email.to = helpdesk@corp.local
action.email.subject = [ALERT] AD Account Locked Out: $result.locked_account$
action.email.message.alert = Account lockout detected on $result.host$.\n\nLocked Account: $result.locked_account$\nSource Workstation: $result.source_workstation$\nTime: $result._time$\n\nLogin to Splunk for details or use the unlock script:\n  .\scripts\powershell\02-unlock-account.ps1 -Username $result.locked_account$
action.email.sendresults = 1
action.email.inline = 1
action.email.format = table

# Webhook action ‚Äî uncomment and set URL if using Teams/Slack/osTicket integration
# action.webhook = 1
# action.webhook.param.url = https://your-webhook-url/alerts


# ‚îÄ‚îÄ Alert 2: Brute Force Login Attempt ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
[ALERT - Brute Force Login Attempt]
search = index=wineventlog sourcetype="WinEventLog:Security" EventCode=4625 \
| eval target_account=mvindex(Account_Name,1) \
| eval source_ip=coalesce(IpAddress,Source_Network_Address,"unknown") \
| bucket _time span=10m \
| stats count AS failure_count, values(source_ip) AS source_ips BY _time, target_account \
| where failure_count >= 5 \
| eval risk=case(failure_count>=20,"CRITICAL",failure_count>=10,"HIGH",true(),"MEDIUM")
description = Fires when a single account accumulates 5+ failed logon attempts (Event 4625) \
within any 10-minute window. Catches brute force, credential stuffing, and misconfigured \
services with cached bad credentials.
disabled = 0
cron_schedule = */10 * * * *
dispatch.earliest_time = -12m
dispatch.latest_time = now
enableSched = 1
counttype = number of events
relation = greater than
quantity = 0
alert.severity = 4
alert.suppress = 1
alert.suppress.period = 10m
alert.suppress.fields = target_account
alert_type = number of events
alert.track = 1

action.email = 1
action.email.to = helpdesk@corp.local,security@corp.local
action.email.subject = [ALERT $result.risk$] Brute Force Detected: $result.target_account$
action.email.message.alert = Brute force login attempt detected.\n\nAccount: $result.target_account$\nFailure Count: $result.failure_count$ in 10 minutes\nSource IPs: $result.source_ips$\nRisk Level: $result.risk$\n\nIf this is a real attack, consider blocking the source IP on pfSense.
action.email.sendresults = 1
action.email.inline = 1
action.email.format = table


# ‚îÄ‚îÄ Alert 3: GPO or Audit Policy Changed ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
[ALERT - GPO or Audit Policy Changed]
search = index=wineventlog sourcetype="WinEventLog:Security" \
  (EventCode=5136 OR EventCode=5137 OR EventCode=5141 OR EventCode=4719) \
| eval change_type=case( \
    EventCode=="5136","GPO Modified", \
    EventCode=="5137","GPO/Object Created", \
    EventCode=="5141","AD Object Deleted", \
    EventCode=="4719","Audit Policy Changed", \
    true(),"Unknown") \
| eval actor=mvindex(Subject_Account_Name,0) \
| eval gpo_dn=mvindex(Object_DN,0) \
| where NOT match(actor,"(?i)^(SYSTEM|DC01\$|Administrator)$") \
| table _time, change_type, actor, gpo_dn, host
description = Fires when any GPO is created, modified, or deleted, or when audit \
policy is changed (Events 5136/5137/5141/4719). Filters out expected system accounts \
to reduce noise. Changes by non-admin accounts are always high priority.
disabled = 0
cron_schedule = */5 * * * *
dispatch.earliest_time = -6m
dispatch.latest_time = now
enableSched = 1
counttype = number of events
relation = greater than
quantity = 0
alert.severity = 4
alert.suppress = 0
alert_type = number of events
alert.track = 1

action.email = 1
action.email.to = helpdesk@corp.local,security@corp.local
action.email.subject = [ALERT] GPO/AD Policy Change by $result.actor$
action.email.message.alert = A Group Policy or audit policy change was detected.\n\nChange Type: $result.change_type$\nPerformed By: $result.actor$\nObject: $result.gpo_dn$\nDomain Controller: $result.host$\nTime: $result._time$\n\nVerify this change was authorized. Unauthorized GPO changes can affect security posture.
action.email.sendresults = 1
action.email.inline = 1


# ‚îÄ‚îÄ Alert 4: New User Account Created ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
[ALERT - New AD User Account Created]
search = index=wineventlog sourcetype="WinEventLog:Security" EventCode=4720 \
| eval new_account=mvindex(Target_Account_Name,0) \
| eval created_by=mvindex(Subject_Account_Name,0) \
| eval is_privileged=if(match(new_account,"(?i)(admin|svc|service|sa_|adm_|root)"),"YES","No") \
| table _time, new_account, created_by, is_privileged, host
description = Fires whenever a new AD user account is created (Event 4720). \
Accounts with admin-sounding names are flagged as potentially privileged. \
Useful for detecting unauthorized account creation or insider threat activity.
disabled = 0
cron_schedule = */5 * * * *
dispatch.earliest_time = -6m
dispatch.latest_time = now
enableSched = 1
counttype = number of events
relation = greater than
quantity = 0
alert.severity = 3
alert.suppress = 1
alert.suppress.period = 1m
alert.suppress.fields = new_account
alert_type = number of events
alert.track = 1

action.email = 1
action.email.to = helpdesk@corp.local,hr@corp.local
action.email.subject = [INFO] New AD Account Created: $result.new_account$
action.email.message.alert = A new Active Directory account was created.\n\nNew Account: $result.new_account$\nCreated By: $result.created_by$\nPrivileged Name Match: $result.is_privileged$\nDomain Controller: $result.host$\nTime: $result._time$\n\nVerify this account was created per an approved onboarding request in the helpdesk system.
action.email.sendresults = 1
action.email.inline = 1


# ‚îÄ‚îÄ Alert 5: After-Hours Admin Activity ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
[ALERT - After-Hours Admin Logon]
search = index=wineventlog sourcetype="WinEventLog:Security" \
  (EventCode=4624 OR EventCode=4648) \
| eval actor=mvindex(Account_Name,1) \
| eval logon_hour=tonumber(strftime(_time,"%H")) \
| where (logon_hour < 7 OR logon_hour >= 19) \
| lookup admin_accounts.csv username AS actor OUTPUTNEW is_admin \
| where is_admin="true" OR match(actor,"(?i)(admin|jsmith|mchen)") \
| eval logon_time=strftime(_time,"%Y-%m-%d %H:%M:%S") \
| table logon_time, actor, WorkstationName, IpAddress, host
description = Fires when a known admin or privileged account logs on outside business \
hours (before 7am or after 7pm). Helps catch unauthorized after-hours access.
disabled = 0
cron_schedule = 0 * * * *
dispatch.earliest_time = -65m
dispatch.latest_time = now
enableSched = 1
counttype = number of events
relation = greater than
quantity = 0
alert.severity = 3
alert.track = 1

action.email = 1
action.email.to = security@corp.local
action.email.subject = [ALERT] After-Hours Admin Logon: $result.actor$
action.email.message.alert = An administrative account logged on outside business hours.\n\nAccount: $result.actor$\nWorkstation: $result.WorkstationName$\nSource IP: $result.IpAddress$\nDC: $result.host$\nTime: $result.logon_time$\n\nVerify this was an authorized maintenance activity.
action.email.sendresults = 1
