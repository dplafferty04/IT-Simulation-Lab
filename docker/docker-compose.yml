version: "3.9"

# ============================================================
# CorpTech IT Simulation Lab — Top-Level Compose
# Runs all services together. Individual service compose files
# can also be used independently for isolated testing.
# ============================================================

services:

  # ----------------------------------------------------------
  # osTicket Database
  # ----------------------------------------------------------
  osticket-db:
    image: mariadb:10.11
    container_name: osticket_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${OST_DB_ROOT_PASSWORD:-R00tP@ssw0rd!ChangeMeNow}
      MYSQL_DATABASE: osticket
      MYSQL_USER: osticket
      MYSQL_PASSWORD: ${OST_DB_PASSWORD:-0sTick3t!P@ssChangeMeNow}
    volumes:
      - osticket_db_data:/var/lib/mysql
    networks:
      - corptech_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root",
             "-p${OST_DB_ROOT_PASSWORD:-R00tP@ssw0rd!ChangeMeNow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # osTicket Application
  # ----------------------------------------------------------
  osticket:
    image: devinsolutions/osticket:1.17.5
    container_name: osticket_app
    restart: unless-stopped
    depends_on:
      osticket-db:
        condition: service_healthy
    expose:
      - "80"
    environment:
      MYSQL_HOST: osticket-db
      MYSQL_DATABASE: osticket
      MYSQL_USER: osticket
      MYSQL_PASSWORD: ${OST_DB_PASSWORD:-0sTick3t!P@ssChangeMeNow}
      INSTALL_SECRET: ${OST_INSTALL_SECRET:-Ch4ng3M3N0w!2024XYZ_UniqueSecret}
      INSTALL_NAME: "CorpTech IT Helpdesk"
      INSTALL_EMAIL: helpdesk@corp.local
      INSTALL_URL: "http://${HOST_IP:-localhost}:8080/"
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@corp.local}
      ADMIN_FIRSTNAME: Admin
      ADMIN_LASTNAME: User
      ADMIN_USERNAME: ostadmin
      ADMIN_PASSWORD: ${OST_ADMIN_PASSWORD:-C0rpT3ch!Admin}
    volumes:
      - osticket_uploads:/var/www/html/upload
      - osticket_plugins:/var/www/html/include/plugins
    networks:
      - corptech_net

  # ----------------------------------------------------------
  # MeshCentral Remote Support
  # ----------------------------------------------------------
  meshcentral:
    image: ghcr.io/ylianst/meshcentral:latest
    container_name: meshcentral
    restart: unless-stopped
    ports:
      - "8086:443"
      - "4433:4433"   # Agent port — must be reachable by VMs on your LAN
    environment:
      - NODE_ENV=production
      - HOSTNAME=${MESH_HOSTNAME:-192.168.10.50}
      - ALLOW_NEW_ACCOUNTS=false
      - WEBRTC=true
    volumes:
      - meshcentral_data:/opt/meshcentral/meshcentral-data
      - meshcentral_user_files:/opt/meshcentral/meshcentral-files
      - meshcentral_backup:/opt/meshcentral/meshcentral-backup
      - ./meshcentral/config/config.json:/opt/meshcentral/meshcentral-data/config.json:ro
    networks:
      - corptech_net

  # ----------------------------------------------------------
  # Nginx Reverse Proxy
  # Serves osTicket on :8080, MeshCentral proxied via :8086
  # ----------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: corptech_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - osticket
    networks:
      - corptech_net

  # ----------------------------------------------------------
  # Splunk Enterprise
  # Web UI on :8000 | HEC on :8088 | Syslog on :5514 (UDP)
  # ----------------------------------------------------------
  splunk:
    image: splunk/splunk:9.3
    container_name: corptech_splunk
    restart: unless-stopped
    ports:
      - "8000:8000"   # Web UI
      - "8088:8088"   # HTTP Event Collector
      - "5514:5514/udp" # Syslog input
    environment:
      SPLUNK_START_ARGS: "--accept-license"
      SPLUNK_PASSWORD: ${SPLUNK_PASSWORD:-Knucklehead526$}
      SPLUNK_LICENSE_URI: "Free"
      SPLUNK_APPS_URL: ""
    volumes:
      - splunk_data:/opt/splunk/var
      - splunk_etc:/opt/splunk/etc
      - nginx_logs:/var/log/nginx:ro
      - ./splunk/apps/corptech_helpdesk:/opt/splunk/etc/apps/corptech_helpdesk
    networks:
      - corptech_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

volumes:
  osticket_db_data:
  osticket_uploads:
  osticket_plugins:
  meshcentral_data:
  meshcentral_user_files:
  meshcentral_backup:
  nginx_logs:
  splunk_data:
  splunk_etc:

networks:
  corptech_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
